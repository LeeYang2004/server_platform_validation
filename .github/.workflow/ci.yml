# .github/workflows/ci.yml

# Name displayed in the GitHub Actions tab
name: ServerBench CI

# Define events that trigger this workflow
on: [push, pull_request]

jobs:
  # Define a job
  test:

    # Use GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest
    steps:

      # Step 1: Checkout repository code into the runner
      - uses: actions/checkout@v4

      # Step 2: Install and configure Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install required project dependencies
      - name: Install dependencies
        run: pip install pytest psutil click jinja2 pyyaml

      # Step 4: Execute all unit tests
      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      # Step 5: Execute a lightweight benchmark validation
      - name: Run quick benchmark
        run: python cli.py --workload db --duration 10 --output reports/ci_report.html

      # Step 6: Upload generated report as a build artifact
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:

          # Artifact name shown in GitHub Actions UI
          name: validation-report

          # Upload all files under reports directory
          path: reports/